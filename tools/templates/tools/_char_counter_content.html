<div class="tool-page">
    <div class="tool-breadcrumb"><a href="{% url 'tools:index' %}" class="htmx-link">便利ツール</a> &gt; 文字数カウンター</div>
    <h1>文字数カウンター</h1>
    <p class="tool-desc">テキストの文字数・単語数・バイト数をリアルタイムで計算します。</p>
    <template id="toolHelpSrc">{% include "tools/help/_char_counter.html" %}</template>

    <div class="cc-stats">
        <div class="cc-stat"><span id="charCount">0</span><small>文字</small></div>
        <div class="cc-stat"><span id="charNoSpace">0</span><small>文字（空白除く）</small></div>
        <div class="cc-stat"><span id="wordCount">0</span><small>単語</small></div>
        <div class="cc-stat"><span id="lineCount">0</span><small>行</small></div>
        <div class="cc-stat"><span id="byteCount">0</span><small>バイト (UTF-8)</small></div>
    </div>

    <textarea id="textInput" class="tool-textarea" rows="15" placeholder="ここにテキストを入力..."></textarea>
</div>
{% include "tools/_tool_style.html" %}
<style>
.cc-stats { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1rem; }
.cc-stat { background: var(--color-bg-white); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 0.8rem 1.2rem; text-align: center; flex: 1; min-width: 100px; }
.cc-stat span { display: block; font-size: 1.5rem; font-weight: 700; color: var(--color-primary); }
.cc-stat small { font-size: 0.75rem; color: var(--color-text-muted); }
.tool-textarea { width: 100%; padding: 1rem; border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: 15px; resize: vertical; outline: none; background: var(--color-bg-white); }
.tool-textarea:focus { border-color: var(--color-primary); }
</style>
<script>
(function() {
    const input = document.getElementById('textInput');
    function update() {
        const text = input.value;
        document.getElementById('charCount').textContent = text.length;
        document.getElementById('charNoSpace').textContent = text.replace(/\s/g, '').length;
        const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        document.getElementById('wordCount').textContent = words;
        document.getElementById('lineCount').textContent = text === '' ? 0 : text.split('\n').length;
        document.getElementById('byteCount').textContent = new Blob([text]).size;
    }
    input.addEventListener('input', update);
    update();
})();
</script>
