<div class="tool-page">
    <div class="tool-breadcrumb"><a href="{% url 'tools:index' %}" class="htmx-link">便利ツール</a> &gt; パスワード強度チェッカー</div>
    <h1>パスワード強度チェッカー</h1>
    <p class="tool-desc">パスワードの強度を診断します。入力データはサーバーに送信されず、ブラウザ上のみで処理されます。</p>
    <template id="toolHelpSrc">{% include "tools/help/_password_strength.html" %}</template>

    <div class="pw-input-wrap">
        <input type="text" id="pwInput" placeholder="パスワードを入力" autocomplete="off" spellcheck="false">
    </div>

    <div id="result" style="display:none">
        <div class="pw-meter">
            <div class="pw-meter-bar" id="meterBar"></div>
        </div>
        <div class="pw-level" id="levelText"></div>

        <table class="tool-table">
            <tbody>
                <tr><th>文字数</th><td id="r-length"></td></tr>
                <tr><th>エントロピー</th><td id="r-entropy"></td></tr>
                <tr><th>推定解読時間</th><td id="r-crack-time"></td></tr>
                <tr><th>文字種</th><td id="r-charset"></td></tr>
            </tbody>
        </table>

        <div id="adviceArea" class="pw-advice">
            <h2>改善アドバイス</h2>
            <ul id="adviceList"></ul>
        </div>
    </div>
</div>
{% include "tools/_tool_style.html" %}
<style>
.pw-input-wrap { margin-bottom: 1rem; }
.pw-input-wrap input { width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: 16px; font-family: 'SF Mono', monospace; outline: none; }
.pw-input-wrap input:focus { border-color: var(--color-primary); }
.pw-meter { height: 8px; background: var(--color-bg-subtle); border-radius: 4px; overflow: hidden; margin-bottom: 0.3rem; }
.pw-meter-bar { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; width: 0; }
.pw-level { font-weight: 700; font-size: 1.1rem; margin-bottom: 1rem; }
.pw-advice { margin-top: 1.5rem; }
.pw-advice h2 { font-size: 1rem; color: var(--color-dark); margin-bottom: 0.5rem; }
.pw-advice ul { list-style: none; padding: 0; }
.pw-advice li { padding: 0.3rem 0; color: var(--color-text-muted); font-size: 0.9rem; }
.pw-advice li::before { content: "・"; color: var(--color-primary); }
</style>
<script>
(function() {
    const input = document.getElementById('pwInput');
    const resultEl = document.getElementById('result');

    const COMMON_PASSWORDS = [
        'password','123456','12345678','qwerty','abc123','monkey','1234567','letmein',
        'trustno1','dragon','baseball','iloveyou','master','sunshine','ashley','bailey',
        'shadow','123123','654321','superman','qazwsx','michael','football','password1',
        '1234567890','000000','access','hello','charlie','donald','admin','welcome',
        'login','princess','starwars','passw0rd','azerty','solo','whatever','ninja',
        'mustang','p@ssw0rd','internet','google','pokemon','zxcvbn','abcdef','test',
        'password123','pa$$word','1q2w3e4r','qwerty123','letmein1','iloveu','999999',
        'computer','aaaaaa','111111','flower','cheese','tigger','orange','cookie',
        'freedom','thunder','ginger','samantha','hunter','pepper','buster','joshua',
        'amanda','summer','love','jessica','daniel','killer','soccer','harley',
        'ranger','thomas','robert','jordan','asshole','phoenix','andrew','bandit',
        'batman','william','dennis','guitar','paradise','matrix','yankees','merlin',
        'corvette','mercedes','steelers','diamond','dakota','chicken','liverpool','bigdog',
        'secret','london','johnny','789456','maggie','tennis','cowboy','hammer',
    ];

    function analyze(pw) {
        if (!pw) { resultEl.style.display = 'none'; return; }
        resultEl.style.display = 'block';

        const len = pw.length;
        const hasLower = /[a-z]/.test(pw);
        const hasUpper = /[A-Z]/.test(pw);
        const hasDigit = /\d/.test(pw);
        const hasSymbol = /[^a-zA-Z0-9]/.test(pw);

        // 文字種の幅
        let poolSize = 0;
        if (hasLower) poolSize += 26;
        if (hasUpper) poolSize += 26;
        if (hasDigit) poolSize += 10;
        if (hasSymbol) poolSize += 33;
        if (poolSize === 0) poolSize = 26;

        const entropy = len * Math.log2(poolSize);

        // 推定解読時間 (10億回/秒の前提)
        const combos = Math.pow(poolSize, len);
        const seconds = combos / 1e9 / 2;
        const crackTime = formatTime(seconds);

        // スコア算出
        let score = 0;
        if (len >= 8) score += 1;
        if (len >= 12) score += 1;
        if (len >= 16) score += 1;
        if (hasLower && hasUpper) score += 1;
        if (hasDigit) score += 1;
        if (hasSymbol) score += 1;
        if (entropy >= 40) score += 1;
        if (entropy >= 60) score += 1;

        // ペナルティ
        if (COMMON_PASSWORDS.includes(pw.toLowerCase())) score = 0;
        if (/^(.)\1+$/.test(pw)) score = Math.min(score, 1); // 全同じ文字
        if (/^(012|123|234|345|456|567|678|789|abc|bcd|cde|def)/i.test(pw)) score = Math.max(score - 1, 0);

        const levels = [
            { label: '非常に弱い', color: '#c0392b', pct: 10 },
            { label: '弱い', color: '#e74c3c', pct: 25 },
            { label: 'やや弱い', color: '#e67e22', pct: 40 },
            { label: '普通', color: '#f39c12', pct: 55 },
            { label: 'やや強い', color: '#27ae60', pct: 70 },
            { label: '強い', color: '#2ecc71', pct: 85 },
            { label: '非常に強い', color: '#1abc9c', pct: 95 },
            { label: '非常に強い', color: '#1abc9c', pct: 100 },
        ];
        const level = levels[Math.min(score, levels.length - 1)];

        document.getElementById('meterBar').style.width = level.pct + '%';
        document.getElementById('meterBar').style.background = level.color;
        const levelText = document.getElementById('levelText');
        levelText.textContent = level.label;
        levelText.style.color = level.color;

        document.getElementById('r-length').textContent = len + '文字';
        document.getElementById('r-entropy').textContent = entropy.toFixed(1) + ' bit';
        document.getElementById('r-crack-time').textContent = crackTime;

        const charTypes = [];
        if (hasLower) charTypes.push('小文字');
        if (hasUpper) charTypes.push('大文字');
        if (hasDigit) charTypes.push('数字');
        if (hasSymbol) charTypes.push('記号');
        document.getElementById('r-charset').textContent = charTypes.join('・') + '（プールサイズ: ' + poolSize + '）';

        // アドバイス
        const advice = [];
        if (len < 8) advice.push('8文字以上にしましょう');
        if (len < 12) advice.push('12文字以上にするとさらに安全です');
        if (!hasUpper) advice.push('大文字を含めましょう');
        if (!hasLower) advice.push('小文字を含めましょう');
        if (!hasDigit) advice.push('数字を含めましょう');
        if (!hasSymbol) advice.push('記号（!@#$%等）を含めましょう');
        if (COMMON_PASSWORDS.includes(pw.toLowerCase())) advice.push('よく使われるパスワードです。別のものにしましょう');
        if (/^(.)\1+$/.test(pw)) advice.push('同じ文字の繰り返しは避けましょう');
        if (advice.length === 0) advice.push('十分な強度のパスワードです');

        const list = document.getElementById('adviceList');
        list.innerHTML = advice.map(a => '<li>' + a + '</li>').join('');
    }

    function formatTime(seconds) {
        if (seconds < 0.001) return '一瞬';
        if (seconds < 1) return '1秒未満';
        if (seconds < 60) return Math.ceil(seconds) + '秒';
        if (seconds < 3600) return Math.ceil(seconds / 60) + '分';
        if (seconds < 86400) return Math.ceil(seconds / 3600) + '時間';
        if (seconds < 86400 * 365) return Math.ceil(seconds / 86400) + '日';
        if (seconds < 86400 * 365 * 1000) return Math.ceil(seconds / (86400 * 365)) + '年';
        if (seconds < 86400 * 365 * 1e6) return Math.ceil(seconds / (86400 * 365 * 1000)) + '千年';
        if (seconds < 86400 * 365 * 1e9) return Math.ceil(seconds / (86400 * 365 * 1e6)) + '百万年';
        return '数十億年以上';
    }

    input.addEventListener('input', () => analyze(input.value));
})();
</script>
