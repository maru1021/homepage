<div class="tool-page">
    <div class="tool-breadcrumb"><a href="{% url 'tools:index' %}" class="htmx-link">便利ツール</a> &gt; パスワード生成器</div>
    <h1>パスワード生成器</h1>
    <p class="tool-desc">安全なランダムパスワードを生成します。すべてブラウザ内で処理され、外部に送信されません。</p>
    <template id="toolHelpSrc">{% include "tools/help/_password_generator.html" %}</template>

    <div class="pw-options">
        <div class="pw-option">
            <label>文字数: <span id="lenVal">16</span></label>
            <input type="range" id="pwLength" min="4" max="128" value="16">
        </div>
        <div class="pw-checks">
            <label><input type="checkbox" id="chkUpper" checked> 大文字 (A-Z)</label>
            <label><input type="checkbox" id="chkLower" checked> 小文字 (a-z)</label>
            <label><input type="checkbox" id="chkDigit" checked> 数字 (0-9)</label>
            <label><input type="checkbox" id="chkSymbol" checked> 記号 (!@#$...)</label>
        </div>
    </div>

    <div class="tool-actions">
        <button id="genBtn" type="button">生成</button>
        <button id="copyBtn" type="button" class="btn-secondary">コピー</button>
    </div>
    <div id="error" class="tool-error" style="display:none"></div>
    <div class="pw-output" id="pwOutput"></div>
    <div class="pw-strength" id="pwStrength"></div>
</div>
{% include "tools/_tool_style.html" %}
<style>
.pw-options { margin-bottom: 1rem; }
.pw-option label { font-weight: 600; font-size: 0.9rem; color: var(--color-text-light); }
.pw-option input[type=range] { width: 100%; margin-top: 0.3rem; }
.pw-checks { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 0.8rem; }
.pw-checks label { font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 0.3rem; }
.tool-actions { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
.tool-actions button { padding: 0.5rem 1rem; border: none; border-radius: var(--radius-md); cursor: pointer; font-size: 0.9rem; }
.tool-actions button:first-child { background: var(--color-primary); color: #fff; }
.btn-secondary { background: var(--color-bg-subtle); color: var(--color-text); border: 1px solid var(--color-border) !important; }
.pw-output { padding: 1rem; background: var(--color-bg-white); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 1.2rem; word-break: break-all; min-height: 3rem; letter-spacing: 1px; }
.pw-strength { margin-top: 0.5rem; font-size: 0.85rem; color: var(--color-text-muted); }
</style>
<script>
(function() {
    const slider = document.getElementById('pwLength');
    const lenVal = document.getElementById('lenVal');
    const output = document.getElementById('pwOutput');
    const strength = document.getElementById('pwStrength');
    const errorEl = document.getElementById('error');

    slider.addEventListener('input', () => { lenVal.textContent = slider.value; });

    function generate() {
        errorEl.style.display = 'none';
        const len = parseInt(slider.value);
        let chars = '';
        if (document.getElementById('chkUpper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        if (document.getElementById('chkLower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
        if (document.getElementById('chkDigit').checked) chars += '0123456789';
        if (document.getElementById('chkSymbol').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
        if (!chars) { errorEl.textContent = '最低1つの文字種を選択してください'; errorEl.style.display = 'block'; return; }
        const arr = new Uint32Array(len);
        crypto.getRandomValues(arr);
        let pw = '';
        for (let i = 0; i < len; i++) pw += chars[arr[i] % chars.length];
        output.textContent = pw;

        const bits = Math.floor(len * Math.log2(chars.length));
        let label = '弱い', color = '#c0392b';
        if (bits >= 128) { label = '非常に強い'; color = '#27ae60'; }
        else if (bits >= 80) { label = '強い'; color = '#2ecc71'; }
        else if (bits >= 50) { label = '普通'; color = '#f39c12'; }
        strength.innerHTML = `強度: <strong style="color:${color}">${label}</strong> (${bits} bits)`;
    }

    document.getElementById('genBtn').addEventListener('click', generate);
    document.getElementById('copyBtn').addEventListener('click', () => {
        toolCopy(output.textContent);
    });
    generate();
})();
</script>
