<h3>使い方</h3>
<ul>
    <li>左側にMarkdownを入力すると、右側にリアルタイムでプレビュー表示します。</li>
</ul>
<h3>対応記法</h3>
<ul>
    <li><strong>見出し</strong> — # h1 〜 ###### h6</li>
    <li><strong>リスト</strong> — -, *, 1. による箇条書き</li>
    <li><strong>コードブロック</strong> — バッククォート3つで囲む</li>
    <li><strong>テーブル</strong> — パイプ(|)区切り</li>
</ul>
