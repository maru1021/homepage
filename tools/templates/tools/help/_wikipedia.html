<h3>使い方</h3>
<ul>
    <li>キーワードを入力して検索ボタンを押すと、Wikipedia日本語版の記事要約を表示します。</li>
    <li>関連する記事のボタンをクリックすると、そのキーワードで再検索できます。</li>
</ul>
<h3>表示内容</h3>
<ul>
    <li><strong>記事タイトル</strong> — Wikipediaの記事タイトル</li>
    <li><strong>要約</strong> — 記事の冒頭部分の要約文</li>
    <li><strong>サムネイル</strong> — 記事に関連する画像（ある場合）</li>
    <li><strong>関連記事</strong> — 検索候補として表示される関連記事</li>
</ul>
