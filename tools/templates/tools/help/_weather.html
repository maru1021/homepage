<h3>使い方</h3>
<ul>
    <li>ページを開くと、日本地図上に全都市の天気が自動表示されます。</li>
    <li>地図上の都市をタップすると、詳細な天気と7日間予報を確認できます。</li>
</ul>
<h3>表示内容</h3>
<ul>
    <li><strong>地図上</strong> — 天気アイコンと気温を一覧表示</li>
    <li><strong>現在の天気</strong> — 気温・天気・湿度・風速</li>
    <li><strong>7日間予報</strong> — 最高気温・最低気温・降水確率</li>
</ul>
<h3>対応都市</h3>
<ul>
    <li>札幌・仙台・新潟・金沢・東京・名古屋・大阪・広島・福岡・那覇</li>
</ul>
