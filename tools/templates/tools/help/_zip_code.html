<h3>郵便番号 → 住所</h3>
<ul>
    <li>7桁の郵便番号を入力すると、都道府県・市区町村・町域を表示します。</li>
    <li><strong>ハイフンあり・なし</strong> — どちらでも検索できます（例: 100-0001 / 1000001）</li>
</ul>
<h3>住所 → 郵便番号</h3>
<ul>
    <li>住所のキーワードを入力すると、該当する郵便番号の一覧を表示します。</li>
    <li><strong>部分一致検索</strong> — 市区町村名や町域名の一部でも検索可能です</li>
    <li>結果の行をタップすると郵便番号をコピーできます。</li>
</ul>
