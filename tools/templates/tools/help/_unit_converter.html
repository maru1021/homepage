<h3>使い方</h3>
<ul>
    <li>変換元の値と単位を入力すると、対応する単位に自動変換します。</li>
</ul>
<h3>対応カテゴリ</h3>
<ul>
    <li><strong>長さ</strong> — mm, cm, m, km, inch, foot, yard, mile</li>
    <li><strong>重さ</strong> — mg, g, kg, ton, oz, lb</li>
    <li><strong>温度</strong> — 摂氏, 華氏, ケルビン</li>
    <li><strong>面積・体積</strong> — 各種単位に対応</li>
</ul>
