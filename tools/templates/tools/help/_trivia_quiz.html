<h3>遊び方</h3>
<ul>
    <li>カテゴリと難易度を選んで「出題」ボタンを押すと、4択クイズが出題されます。</li>
    <li>選択肢をタップすると正誤が表示され、スコアが更新されます。</li>
</ul>
<h3>設定</h3>
<ul>
    <li><strong>カテゴリ</strong> — 一般知識・科学・歴史・地理・スポーツなど</li>
    <li><strong>難易度</strong> — Easy / Medium / Hard の3段階</li>
    <li>問題は英語で出題されます（Open Trivia DB）</li>
</ul>
