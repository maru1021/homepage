<h3>使い方</h3>
<ul>
    <li>タイトルや説明、画像URLを入力すると、OGPメタタグのHTMLを生成します。</li>
</ul>
<h3>生成されるタグ</h3>
<ul>
    <li><strong>og:title</strong> — ページタイトル</li>
    <li><strong>og:description</strong> — ページ説明</li>
    <li><strong>og:image</strong> — シェア時の画像URL</li>
    <li><strong>twitter:card</strong> — Twitter用カード設定</li>
</ul>
