<h3>表示される項目</h3>
<ul>
    <li><strong>文字数</strong> — 空白・改行を含む全文字数</li>
    <li><strong>文字数（空白除く）</strong> — スペース・タブ・改行を除いた文字数</li>
    <li><strong>単語数</strong> — 空白区切りの単語数（英語テキスト向け）</li>
    <li><strong>行数</strong> — 改行で区切られた行の数</li>
    <li><strong>バイト数 (UTF-8)</strong> — UTF-8でのバイト数。日本語は1文字3バイト</li>
</ul>

<h3>活用例</h3>
<ul>
    <li>SNS投稿の文字数チェック（X: 140文字 / Instagram: 2,200文字）</li>
    <li>レポートや論文の文字数確認</li>
    <li>プログラムのデータサイズ見積もり</li>
</ul>
