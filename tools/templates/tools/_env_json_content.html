<div class="tool-page" style="max-width:900px;">
    <div class="tool-breadcrumb"><a href="{% url 'tools:index' %}" class="htmx-link">便利ツール</a> &gt; .env ↔ JSON 変換</div>
    <h1>.env ↔ JSON 変換</h1>
    <p class="tool-desc">環境変数ファイル(.env)とJSONを相互に変換できます。</p>
    <template id="toolHelpSrc">{% include "tools/help/_env_json.html" %}</template>

    <div id="error" class="tool-error" style="display:none"></div>
    <div class="cj-container">
        <div class="cj-pane">
            <div class="cj-pane-header"><span class="cj-label">.env</span><button id="envCopyBtn" type="button" class="btn-sm">コピー</button></div>
            <textarea id="envInput" class="tool-textarea" rows="14" placeholder="KEY=value">DATABASE_HOST=localhost
DATABASE_PORT=5432
DATABASE_NAME=mydb
SECRET_KEY=super-secret-key-123
DEBUG=true
ALLOWED_HOSTS=example.com,www.example.com</textarea>
        </div>
        <div class="cj-arrows">
            <button id="envToJsonBtn" type="button" title=".env → JSON">→</button>
            <button id="jsonToEnvBtn" type="button" title="JSON → .env">←</button>
        </div>
        <div class="cj-pane">
            <div class="cj-pane-header"><span class="cj-label">JSON</span><button id="jsonCopyBtn" type="button" class="btn-sm">コピー</button></div>
            <textarea id="jsonInput" class="tool-textarea" rows="14" placeholder='{"KEY": "value"}'></textarea>
        </div>
    </div>
</div>
{% include "tools/_tool_style.html" %}
<style>
.cj-container { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0.5rem; align-items: start; }
.cj-pane-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
.cj-label { font-size: 0.8rem; font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; }
.cj-arrows { display: flex; flex-direction: column; gap: 0.5rem; padding-top: 2rem; }
.cj-arrows button { padding: 0.6rem 1rem; background: var(--color-primary); color: #fff; border: none; border-radius: var(--radius-md); cursor: pointer; font-size: 1.2rem; font-weight: bold; }
.btn-sm { padding: 0.2rem 0.6rem; font-size: 0.8rem; background: var(--color-bg-subtle); border: 1px solid var(--color-border); border-radius: var(--radius-md); cursor: pointer; }
.tool-textarea { width: 100%; padding: 1rem; border: 1px solid var(--color-border); border-radius: var(--radius-md); font-family: 'SF Mono','Fira Code',monospace; font-size: 13px; resize: vertical; outline: none; background: var(--color-bg-white); }
.tool-textarea:focus { border-color: var(--color-primary); }
@media (max-width: 700px) { .cj-container { grid-template-columns: 1fr; } .cj-arrows { flex-direction: row; justify-content: center; } }
</style>
<script>
(function() {
    const envInput = document.getElementById('envInput');
    const jsonInput = document.getElementById('jsonInput');
    const errorEl = document.getElementById('error');
    function showError(m) { errorEl.textContent = m; errorEl.style.display = ''; }
    function hideError() { errorEl.style.display = 'none'; }

    function parseEnv(text) {
        const obj = {};
        text.split('\n').forEach(line => {
            line = line.trim();
            if (!line || line.startsWith('#')) return;
            const eq = line.indexOf('=');
            if (eq === -1) return;
            let key = line.slice(0, eq).trim();
            let val = line.slice(eq + 1).trim();
            if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'")))
                val = val.slice(1, -1);
            obj[key] = val;
        });
        return obj;
    }

    function toEnv(obj) {
        return Object.entries(obj).map(([k, v]) => {
            const s = String(v);
            const needsQuote = s.includes(' ') || s.includes('#') || s.includes('=');
            return k + '=' + (needsQuote ? '"' + s + '"' : s);
        }).join('\n');
    }

    document.getElementById('envToJsonBtn').addEventListener('click', () => {
        hideError();
        try { jsonInput.value = JSON.stringify(parseEnv(envInput.value), null, 2); }
        catch (e) { showError('.env解析エラー: ' + e.message); }
    });

    document.getElementById('jsonToEnvBtn').addEventListener('click', () => {
        hideError();
        try { envInput.value = toEnv(JSON.parse(jsonInput.value)); }
        catch (e) { showError('JSON解析エラー: ' + e.message); }
    });

    document.getElementById('envCopyBtn').addEventListener('click', () => toolCopy(envInput.value));
    document.getElementById('jsonCopyBtn').addEventListener('click', () => toolCopy(jsonInput.value));
})();
</script>
