<div class="tool-page">
    <div class="tool-breadcrumb"><a href="{% url 'tools:index' %}" class="htmx-link">便利ツール</a> &gt; クイズゲーム</div>
    <h1>クイズゲーム</h1>
    <p class="tool-desc">4択クイズに挑戦！カテゴリと難易度を選んで出題できます。</p>
    <template id="toolHelpSrc">{% include "tools/help/_trivia_quiz.html" %}</template>

    <div class="tq-controls">
        <select id="tqCategory">
            <option value="">全カテゴリ</option>
            <option value="9">General Knowledge</option>
            <option value="17">Science & Nature</option>
            <option value="18">Computers</option>
            <option value="23">History</option>
            <option value="22">Geography</option>
            <option value="21">Sports</option>
            <option value="11">Film</option>
            <option value="12">Music</option>
            <option value="15">Video Games</option>
            <option value="31">Anime & Manga</option>
        </select>
        <select id="tqDifficulty">
            <option value="">全難易度</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
        <button id="tqBtn" type="button">出題</button>
    </div>

    <div id="tqScore" class="tq-score" style="display:none">
        <span>正解: <strong id="tqCorrect">0</strong></span>
        <span>不正解: <strong id="tqWrong">0</strong></span>
    </div>
    <div id="tqError" class="tool-error" style="display:none"></div>
    <div id="tqLoading" class="tool-loading" style="display:none">出題中...</div>

    <div id="tqCard" class="tq-card" style="display:none">
        <div class="tq-meta">
            <span id="tqCat" class="tq-badge"></span>
            <span id="tqDiff" class="tq-badge"></span>
        </div>
        <h2 id="tqQuestion" class="tq-question"></h2>
        <div id="tqChoices" class="tq-choices"></div>
        <div id="tqFeedback" class="tq-feedback" style="display:none"></div>
    </div>
</div>
{% include "tools/_tool_style.html" %}
<style>
.tq-controls { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
.tq-controls select { flex: 1; min-width: 120px; padding: 0.5rem; border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: 14px; }
.tq-controls button { padding: 0.5rem 1.5rem; background: var(--color-primary); color: #fff; border: none; border-radius: var(--radius-md); cursor: pointer; font-size: 1rem; }
.tq-controls button:hover { opacity: 0.85; }
.tq-score { display: flex; gap: 1.5rem; margin-bottom: 1rem; font-size: 0.95rem; }
.tq-score strong { font-size: 1.1rem; }
.tq-card { background: var(--color-bg-white); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 1.5rem; }
.tq-meta { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
.tq-badge { font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 999px; background: #f0f0f0; color: #555; }
.tq-question { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: var(--color-dark); }
.tq-choices { display: flex; flex-direction: column; gap: 0.5rem; }
.tq-choice {
    padding: 0.8rem 1rem; border: 2px solid var(--color-border); border-radius: var(--radius-md);
    background: var(--color-bg-white); cursor: pointer; font-size: 0.95rem;
    transition: all 0.15s; text-align: left;
}
.tq-choice:hover:not(.answered) { border-color: var(--color-primary); background: rgba(108,92,231,0.04); }
.tq-choice.correct { border-color: #27ae60; background: rgba(39,174,96,0.08); color: #27ae60; font-weight: 600; }
.tq-choice.wrong { border-color: #e74c3c; background: rgba(231,76,60,0.08); color: #e74c3c; }
.tq-choice.answered { cursor: default; }
.tq-feedback { margin-top: 1rem; padding: 0.8rem; border-radius: var(--radius-md); font-weight: 600; text-align: center; font-size: 1.1rem; }
.tq-feedback.correct { background: rgba(39,174,96,0.1); color: #27ae60; }
.tq-feedback.wrong { background: rgba(231,76,60,0.1); color: #e74c3c; }
</style>
<script>
(function() {
    function $(id) { return document.getElementById(id); }
    function show(id) { $(id).style.display = 'block'; }
    function hide(id) { $(id).style.display = 'none'; }

    var correct = 0, wrong = 0, currentAnswer = null;

    function decode(str) {
        var el = document.createElement('textarea');
        el.innerHTML = str;
        return el.value;
    }

    function shuffle(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
        }
        return arr;
    }

    async function fetchQuestion() {
        hide('tqError'); hide('tqCard'); show('tqLoading');
        $('tqBtn').disabled = true;
        var cat = $('tqCategory').value;
        var diff = $('tqDifficulty').value;
        var url = 'https://opentdb.com/api.php?amount=1&type=multiple';
        if (cat) url += '&category=' + cat;
        if (diff) url += '&difficulty=' + diff;

        try {
            var resp = await fetch(url);
            var data = await resp.json();
            if (data.response_code !== 0 || !data.results.length) {
                $('tqError').textContent = '問題の取得に失敗しました。カテゴリを変えてお試しください。';
                show('tqError'); return;
            }
            var q = data.results[0];
            currentAnswer = decode(q.correct_answer);
            var choices = shuffle(q.incorrect_answers.map(decode).concat([currentAnswer]));

            $('tqCat').textContent = decode(q.category);
            $('tqDiff').textContent = q.difficulty.charAt(0).toUpperCase() + q.difficulty.slice(1);
            $('tqQuestion').textContent = decode(q.question);

            var choicesEl = $('tqChoices');
            choicesEl.innerHTML = '';
            choices.forEach(function(c) {
                var btn = document.createElement('button');
                btn.className = 'tq-choice';
                btn.type = 'button';
                btn.textContent = c;
                btn.addEventListener('click', function() { answer(btn, c); });
                choicesEl.appendChild(btn);
            });
            hide('tqFeedback');
            show('tqCard');
            show('tqScore');
        } catch(e) { $('tqError').textContent = '通信エラーが発生しました'; show('tqError'); }
        finally { hide('tqLoading'); $('tqBtn').disabled = false; }
    }

    function answer(btn, selected) {
        if (btn.classList.contains('answered')) return;
        document.querySelectorAll('.tq-choice').forEach(function(b) { b.classList.add('answered'); });

        var fb = $('tqFeedback');
        if (selected === currentAnswer) {
            btn.classList.add('correct');
            correct++;
            fb.textContent = 'Correct!';
            fb.className = 'tq-feedback correct';
        } else {
            btn.classList.add('wrong');
            wrong++;
            fb.textContent = 'Wrong! Answer: ' + currentAnswer;
            fb.className = 'tq-feedback wrong';
            document.querySelectorAll('.tq-choice').forEach(function(b) {
                if (b.textContent === currentAnswer) b.classList.add('correct');
            });
        }
        show('tqFeedback');
        $('tqCorrect').textContent = correct;
        $('tqWrong').textContent = wrong;
    }

    $('tqBtn').addEventListener('click', fetchQuestion);
})();
</script>
