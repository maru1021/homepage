<div class="tool-page" style="max-width:900px;">
    <div class="tool-breadcrumb"><a href="{% url 'tools:index' %}" class="htmx-link">便利ツール</a> &gt; YAML ↔ JSON 変換</div>
    <h1>YAML ↔ JSON 変換</h1>
    <p class="tool-desc">YAMLとJSONを相互に変換できます。</p>
    <template id="toolHelpSrc">{% include "tools/help/_yaml_json.html" %}</template>

    <div id="error" class="tool-error" style="display:none"></div>
    <div class="cj-container">
        <div class="cj-pane">
            <div class="cj-pane-header"><span class="cj-label">YAML</span><button id="yamlCopyBtn" type="button" class="btn-sm">コピー</button></div>
            <textarea id="yamlInput" class="tool-textarea" rows="16" placeholder="key: value&#10;list:&#10;  - item1&#10;  - item2">server:
  host: localhost
  port: 8080
database:
  name: mydb
  credentials:
    user: admin
    password: secret
features:
  - auth
  - logging
  - cache</textarea>
        </div>
        <div class="cj-arrows">
            <button id="yamlToJsonBtn" type="button" title="YAML → JSON">→</button>
            <button id="jsonToYamlBtn" type="button" title="JSON → YAML">←</button>
        </div>
        <div class="cj-pane">
            <div class="cj-pane-header"><span class="cj-label">JSON</span><button id="jsonCopyBtn" type="button" class="btn-sm">コピー</button></div>
            <textarea id="jsonInput" class="tool-textarea" rows="16" placeholder='{"key": "value"}'></textarea>
        </div>
    </div>
</div>
{% include "tools/_tool_style.html" %}
<style>
.cj-container { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0.5rem; align-items: start; }
.cj-pane-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
.cj-label { font-size: 0.8rem; font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; }
.cj-arrows { display: flex; flex-direction: column; gap: 0.5rem; padding-top: 2rem; }
.cj-arrows button { padding: 0.6rem 1rem; background: var(--color-primary); color: #fff; border: none; border-radius: var(--radius-md); cursor: pointer; font-size: 1.2rem; font-weight: bold; }
.btn-sm { padding: 0.2rem 0.6rem; font-size: 0.8rem; background: var(--color-bg-subtle); border: 1px solid var(--color-border); border-radius: var(--radius-md); cursor: pointer; }
.tool-textarea { width: 100%; padding: 1rem; border: 1px solid var(--color-border); border-radius: var(--radius-md); font-family: 'SF Mono','Fira Code',monospace; font-size: 13px; resize: vertical; outline: none; background: var(--color-bg-white); }
.tool-textarea:focus { border-color: var(--color-primary); }
@media (max-width: 700px) { .cj-container { grid-template-columns: 1fr; } .cj-arrows { flex-direction: row; justify-content: center; } }
</style>
<script>
(function() {
    const yamlInput = document.getElementById('yamlInput');
    const jsonInput = document.getElementById('jsonInput');
    const errorEl = document.getElementById('error');
    function showError(m) { errorEl.textContent = m; errorEl.style.display = ''; }
    function hideError() { errorEl.style.display = 'none'; }

    // Simple YAML parser (handles basic key:value, lists, nested objects)
    function parseYaml(text) {
        const lines = text.split('\n');
        const result = {};
        const stack = [{ obj: result, indent: -1 }];

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (!line.trim() || line.trim().startsWith('#')) continue;
            const indent = line.search(/\S/);
            const content = line.trim();

            while (stack.length > 1 && indent <= stack[stack.length - 1].indent) stack.pop();
            const parent = stack[stack.length - 1];

            if (content.startsWith('- ')) {
                const val = content.slice(2).trim();
                const parentObj = parent.obj;
                const lastKey = parent.lastKey;
                if (lastKey && !Array.isArray(parentObj[lastKey])) parentObj[lastKey] = [];
                if (lastKey) {
                    const parsed = parseYamlValue(val);
                    parentObj[lastKey].push(parsed);
                }
            } else {
                const colonIdx = content.indexOf(':');
                if (colonIdx === -1) continue;
                const key = content.slice(0, colonIdx).trim();
                const val = content.slice(colonIdx + 1).trim();
                if (val === '' || val === undefined) {
                    if (Array.isArray(parent.obj)) continue;
                    parent.obj[key] = {};
                    stack.push({ obj: parent.obj[key], indent: indent, lastKey: null });
                    parent.lastKey = key;
                } else {
                    parent.obj[key] = parseYamlValue(val);
                    parent.lastKey = key;
                }
            }
        }
        return result;
    }

    function parseYamlValue(val) {
        if (val === 'true' || val === 'True') return true;
        if (val === 'false' || val === 'False') return false;
        if (val === 'null' || val === 'Null' || val === '~') return null;
        if (/^-?\d+$/.test(val)) return parseInt(val);
        if (/^-?\d+\.\d+$/.test(val)) return parseFloat(val);
        if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'")))
            return val.slice(1, -1);
        return val;
    }

    function toYaml(obj, indent) {
        indent = indent || 0;
        const pad = '  '.repeat(indent);
        let out = '';
        if (Array.isArray(obj)) {
            obj.forEach(v => {
                if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
                    out += pad + '-\n' + toYaml(v, indent + 1);
                } else {
                    out += pad + '- ' + yamlVal(v) + '\n';
                }
            });
        } else if (typeof obj === 'object' && obj !== null) {
            Object.entries(obj).forEach(([k, v]) => {
                if (typeof v === 'object' && v !== null) {
                    out += pad + k + ':\n' + toYaml(v, indent + 1);
                } else {
                    out += pad + k + ': ' + yamlVal(v) + '\n';
                }
            });
        }
        return out;
    }

    function yamlVal(v) {
        if (v === null) return 'null';
        if (typeof v === 'boolean') return v ? 'true' : 'false';
        if (typeof v === 'string' && (v.includes(':') || v.includes('#') || v === '')) return '"' + v + '"';
        return String(v);
    }

    document.getElementById('yamlToJsonBtn').addEventListener('click', () => {
        hideError();
        try { jsonInput.value = JSON.stringify(parseYaml(yamlInput.value), null, 2); }
        catch (e) { showError('YAML解析エラー: ' + e.message); }
    });

    document.getElementById('jsonToYamlBtn').addEventListener('click', () => {
        hideError();
        try { yamlInput.value = toYaml(JSON.parse(jsonInput.value)).trim(); }
        catch (e) { showError('JSON解析エラー: ' + e.message); }
    });

    document.getElementById('yamlCopyBtn').addEventListener('click', () => toolCopy(yamlInput.value));
    document.getElementById('jsonCopyBtn').addEventListener('click', () => toolCopy(jsonInput.value));
})();
</script>
