<style>
.tool-page { max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
.tool-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; }
.tool-header h1 { font-size: 1.5rem; color: var(--color-dark); margin: 0; }
.tool-help-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: none; background: linear-gradient(135deg, #a78bfa, #818cf8);
    color: #fff; font-size: 0.82rem; font-weight: 800;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); flex-shrink: 0; line-height: 1; padding: 0;
    box-shadow: 0 2px 8px rgba(167,139,250,0.35);
}
.tool-help-btn:hover {
    transform: scale(1.2) rotate(8deg);
    box-shadow: 0 4px 16px rgba(167,139,250,0.5);
}
.tool-breadcrumb { font-size: 0.85rem; color: var(--color-text-muted); margin-bottom: 0.5rem; }
.tool-breadcrumb a { color: var(--color-primary); text-decoration: none; }
.tool-breadcrumb a:hover { text-decoration: underline; }
.tool-page h1 { font-size: 1.5rem; color: var(--color-dark); margin-bottom: 0.5rem; }
.tool-desc { color: var(--color-text-light); margin-bottom: 1.5rem; }
.tool-form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
.tool-form input { flex: 1; padding: 0.6rem 1rem; border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: 16px; outline: none; transition: border-color 0.2s; }
.tool-form input:focus { border-color: var(--color-primary); }
.tool-form button { padding: 0.6rem 1.5rem; background: var(--color-primary); color: #fff; border: none; border-radius: var(--radius-md); font-size: 1rem; cursor: pointer; transition: opacity 0.2s; }
.tool-form button:hover { opacity: 0.85; }
.tool-form button:disabled { opacity: 0.5; cursor: not-allowed; }
.tool-error { color: #c0392b; margin-bottom: 1rem; }
.tool-loading { color: var(--color-text-muted); margin-bottom: 1rem; }
.tool-table { width: 100%; border-collapse: collapse; background: var(--color-bg-white); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); overflow: hidden; }
.tool-table th, .tool-table td { padding: 0.7rem 1rem; text-align: left; border-bottom: 1px solid var(--color-border-light); }
.tool-table th { width: 130px; background: var(--color-bg-subtle); color: var(--color-text-light); font-weight: 600; font-size: 0.9rem; }
.tool-table tr:last-child th, .tool-table tr:last-child td { border-bottom: none; }
.tool-toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 0.6rem 1.5rem; border-radius: var(--radius-md); font-size: 0.9rem; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.tool-toast.show { opacity: 1; }

/* Help modal */
.tool-help-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,0); display: none;
    justify-content: center; align-items: center;
    transition: background 0.3s ease;
}
.tool-help-overlay.active { display: flex; background: rgba(99,80,170,0.25); backdrop-filter: blur(4px); }
.tool-help-modal {
    background: #fff;
    border-radius: 20px;
    max-width: 540px; width: 92%; max-height: 75vh;
    overflow: hidden; padding: 0;
    position: relative;
    box-shadow: 0 20px 60px rgba(129,140,248,0.2), 0 0 0 1px rgba(167,139,250,0.15);
    transform: translateY(24px) scale(0.95); opacity: 0;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
}
.tool-help-overlay.active .tool-help-modal {
    transform: translateY(0) scale(1); opacity: 1;
}
.tool-help-modal-header {
    position: sticky; top: 0; z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.3rem;
    background: linear-gradient(135deg, #c4b5fd, #a5b4fc);
    color: #fff;
}
.tool-help-modal-header-title {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 1rem; font-weight: 700; margin: 0;
}
.tool-help-modal-header-icon {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 800; flex-shrink: 0;
}
.tool-help-modal-close {
    width: 30px; height: 30px; border-radius: 50%;
    border: none; background: rgba(255,255,255,0.2);
    color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; line-height: 1; transition: all 0.2s;
}
.tool-help-modal-close:hover {
    background: rgba(255,255,255,0.35);
    transform: rotate(90deg);
}
.tool-help-modal-scroll { max-height: calc(75vh - 56px); overflow-y: auto; }
.tool-help-modal-body { padding: 1.3rem 1.3rem 1.5rem; }
.tool-help-modal-body h3 {
    font-size: 0.88rem; font-weight: 700; color: #6d5cae;
    margin: 1.3rem 0 0.5rem 0; padding: 0.35rem 0.8rem;
    background: linear-gradient(90deg, #f0ecff, transparent);
    border-left: 3px solid #a78bfa; border-radius: 0 6px 6px 0;
    display: block;
}
.tool-help-modal-body h3:first-child { margin-top: 0; }
.tool-help-modal-body p {
    color: #555; line-height: 1.75;
    margin: 0.4rem 0; font-size: 0.9rem;
}
.tool-help-modal-body ul, .tool-help-modal-body ol {
    color: #555; line-height: 1.8;
    margin: 0.4rem 0 0.8rem 0; padding-left: 0; list-style: none; font-size: 0.9rem;
}
.tool-help-modal-body li {
    margin-bottom: 0.4rem; padding: 0.35rem 0.7rem;
    background: #faf9ff; border-radius: 8px;
    border: 1px solid #eeebff;
}
.tool-help-modal-body li strong { color: #5b4a9e; }
.tool-help-modal-body code {
    background: #f0ecff; color: #7c5cbf;
    padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.82rem;
}
.tool-help-modal-body kbd {
    background: #fff; border: 1px solid #ddd;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    padding: 0.1rem 0.5rem; border-radius: 4px;
    font-size: 0.82rem; font-family: inherit;
}
.tool-help-modal-scroll::-webkit-scrollbar { width: 5px; }
.tool-help-modal-scroll::-webkit-scrollbar-track { background: transparent; }
.tool-help-modal-scroll::-webkit-scrollbar-thumb { background: #d4cdf5; border-radius: 3px; }
</style>
<div id="toolToast" class="tool-toast"></div>
<div id="toolHelpOverlay" class="tool-help-overlay">
    <div class="tool-help-modal">
        <div class="tool-help-modal-header">
            <div class="tool-help-modal-header-title">
                <span class="tool-help-modal-header-icon">?</span>
                使い方ガイド
            </div>
            <button class="tool-help-modal-close" onclick="toolHelpClose()">&times;</button>
        </div>
        <div class="tool-help-modal-scroll">
            <div id="toolHelpBody" class="tool-help-modal-body"></div>
        </div>
    </div>
</div>
<script>
function toolCopy(text, msg) {
    msg = msg || 'コピーしました';
    function showToast() {
        var t = document.getElementById('toolToast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 1500);
    }
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(showToast).catch(function() { fallback(); });
    } else {
        fallback();
    }
    function fallback() {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px;';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); showToast(); } catch(e) { alert('コピーに失敗しました'); }
        document.body.removeChild(ta);
    }
}
function toolHelpOpen() {
    var src = document.getElementById('toolHelpSrc');
    if (src) {
        document.getElementById('toolHelpBody').innerHTML = src.innerHTML;
    }
    var overlay = document.getElementById('toolHelpOverlay');
    overlay.style.display = 'flex';
    requestAnimationFrame(function() {
        overlay.classList.add('active');
    });
}
function toolHelpClose() {
    var overlay = document.getElementById('toolHelpOverlay');
    overlay.classList.remove('active');
    setTimeout(function() {
        if (!overlay.classList.contains('active')) {
            overlay.style.display = 'none';
        }
    }, 300);
}
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') toolHelpClose();
});
document.addEventListener('click', function(e) {
    if (e.target.id === 'toolHelpOverlay') toolHelpClose();
});
(function() {
    var src = document.getElementById('toolHelpSrc');
    if (!src) return;
    var page = document.querySelector('.tool-page');
    if (!page) return;
    var h1 = page.querySelector('h1');
    if (!h1) return;
    var wrap = document.createElement('div');
    wrap.className = 'tool-header';
    h1.parentNode.insertBefore(wrap, h1);
    wrap.appendChild(h1);
    var btn = document.createElement('button');
    btn.className = 'tool-help-btn';
    btn.title = '使い方';
    btn.textContent = '?';
    btn.onclick = toolHelpOpen;
    wrap.appendChild(btn);
})();
</script>
