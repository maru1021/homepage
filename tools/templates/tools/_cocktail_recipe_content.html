<div class="tool-page">
    <div class="tool-breadcrumb"><a href="{% url 'tools:index' %}" class="htmx-link">便利ツール</a> &gt; カクテルレシピ</div>
    <h1>カクテルレシピ</h1>
    <p class="tool-desc">カクテル名で検索して材料・作り方を確認。ランダム表示も対応。</p>
    <template id="toolHelpSrc">{% include "tools/help/_cocktail_recipe.html" %}</template>

    <div class="tool-form">
        <input type="text" id="ckInput" placeholder="例: Margarita, Mojito, Martini" autocomplete="off" spellcheck="false">
        <button id="ckBtn" type="button">検索</button>
        <button id="ckRandom" type="button" class="ck-random">Random</button>
    </div>

    <div id="ckError" class="tool-error" style="display:none"></div>
    <div id="ckLoading" class="tool-loading" style="display:none">検索中...</div>

    <div id="ckResult" style="display:none"></div>
</div>
{% include "tools/_tool_style.html" %}
<style>
.ck-random {
    padding: 0.6rem 1rem; background: #e67e22; color: #fff; border: none;
    border-radius: var(--radius-md); cursor: pointer; font-size: 0.9rem; white-space: nowrap;
}
.ck-random:hover { opacity: 0.85; }
.ck-card {
    background: var(--color-bg-white); border: 1px solid var(--color-border);
    border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem;
}
.ck-card img { width: 100%; max-height: 300px; object-fit: cover; display: block; }
.ck-body { padding: 1.2rem; }
.ck-body h2 { font-size: 1.2rem; margin-bottom: 0.3rem; color: var(--color-dark); }
.ck-body .ck-cat { font-size: 0.8rem; color: var(--color-text-muted); margin-bottom: 1rem; }
.ck-section { margin-bottom: 1rem; }
.ck-section h3 { font-size: 0.95rem; color: var(--color-dark); margin-bottom: 0.5rem; border-bottom: 1px solid var(--color-border); padding-bottom: 0.3rem; }
.ck-ingredients { list-style: none; padding: 0; }
.ck-ingredients li { padding: 0.3rem 0; font-size: 0.9rem; border-bottom: 1px solid #f5f5f5; }
.ck-ingredients li:last-child { border: none; }
.ck-instructions { font-size: 0.9rem; line-height: 1.6; color: var(--color-text-light); white-space: pre-wrap; }
</style>
<script>
(function() {
    function $(id) { return document.getElementById(id); }
    function show(id) { $(id).style.display = 'block'; }
    function hide(id) { $(id).style.display = 'none'; }

    function renderDrink(d) {
        var ingredients = [];
        for (var i = 1; i <= 15; i++) {
            var ing = d['strIngredient' + i];
            var msr = d['strMeasure' + i] || '';
            if (ing && ing.trim()) ingredients.push(msr.trim() + ' ' + ing.trim());
        }
        var html = '<div class="ck-card">';
        if (d.strDrinkThumb) html += '<img src="' + d.strDrinkThumb + '/preview" alt="' + d.strDrink + '">';
        html += '<div class="ck-body">'
            + '<h2>' + d.strDrink + '</h2>'
            + '<div class="ck-cat">' + (d.strCategory || '') + (d.strAlcoholic ? ' / ' + d.strAlcoholic : '') + '</div>'
            + '<div class="ck-section"><h3>Ingredients</h3><ul class="ck-ingredients">'
            + ingredients.map(function(s) { return '<li>' + s + '</li>'; }).join('')
            + '</ul></div>';
        if (d.strInstructions) {
            html += '<div class="ck-section"><h3>Instructions</h3><div class="ck-instructions">' + d.strInstructions + '</div></div>';
        }
        html += '</div></div>';
        return html;
    }

    async function search(url) {
        hide('ckError'); $('ckResult').innerHTML = ''; hide('ckResult'); show('ckLoading');
        $('ckBtn').disabled = $('ckRandom').disabled = true;
        try {
            var resp = await fetch(url);
            var data = await resp.json();
            var drinks = data.drinks;
            if (!drinks || !drinks.length) {
                $('ckError').textContent = '該当するカクテルが見つかりませんでした';
                show('ckError'); return;
            }
            $('ckResult').innerHTML = drinks.map(renderDrink).join('');
            show('ckResult');
        } catch(e) { $('ckError').textContent = '通信エラーが発生しました'; show('ckError'); }
        finally { hide('ckLoading'); $('ckBtn').disabled = $('ckRandom').disabled = false; }
    }

    $('ckBtn').addEventListener('click', function() {
        var q = $('ckInput').value.trim();
        if (!q) { $('ckError').textContent = 'カクテル名を入力してください'; show('ckError'); return; }
        search('https://www.thecocktaildb.com/api/json/v1/1/search.php?s=' + encodeURIComponent(q));
    });
    $('ckInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') $('ckBtn').click(); });
    $('ckRandom').addEventListener('click', function() {
        search('https://www.thecocktaildb.com/api/json/v1/1/random.php');
    });
})();
</script>
