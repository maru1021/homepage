{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ SITE_NAME }}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'vendor/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'vendor/htmx.min.js' %}"></script>
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'blog:article_list' %}" class="htmx-link">{{ SITE_NAME }}</a>
            <div class="header-search">
                <input type="text" id="searchInput" placeholder="記事を検索..." autocomplete="off"
                       data-search-url="{% url 'blog:article_search' %}"
                       data-home-url="{% url 'blog:article_list' %}">
            </div>
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="メニュー">&#9776;</button>
        </nav>
    </header>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            {% include "blog/_sidebar.html" %}
        </aside>
        <main id="main-content">
            {% block content %}{% endblock %}
            <footer>
                <p>&copy; 2026 {{ SITE_NAME }}</p>
            </footer>
        </main>
    </div>
    <script src="{% static 'vendor/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/sidebar.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
