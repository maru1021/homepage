services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: blog
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=true
      - DATABASE_NAME=blog
      - DATABASE_USER=blog
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000

  stock_fetcher:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=true
      - DATABASE_NAME=blog
      - DATABASE_USER=blog
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - SKIP_MIGRATE=1
    depends_on:
      web:
        condition: service_started
    command: python manage.py run_stock_scheduler
    restart: unless-stopped

  weather_fetcher:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=true
      - DATABASE_NAME=blog
      - DATABASE_USER=blog
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - SKIP_MIGRATE=1
    depends_on:
      web:
        condition: service_started
    command: python manage.py run_weather_scheduler
    restart: unless-stopped

volumes:
  postgres_data:
